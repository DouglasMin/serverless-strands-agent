<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authorizing...</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #0a0a0a;
      color: #e0e0e0;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #333;
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">Completing authorization...</p>
  </div>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const statusEl = document.getElementById("status");
      const spinnerEl = document.getElementById("spinner");

      if (!sessionId) {
        spinnerEl.style.display = "none";
        statusEl.textContent = "Missing session_id — cannot complete auth.";
        statusEl.className = "error";
        return;
      }

      const userId = localStorage.getItem("serverlessstrands:userId") || "anonymous";

      try {
        const base = window.location.origin;
        const res = await fetch(
          `${base}/api/auth/complete?session_id=${encodeURIComponent(sessionId)}&userId=${encodeURIComponent(userId)}`,
          { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ userId }) }
        );
        const data = await res.json();
        spinnerEl.style.display = "none";

        if (data.success) {
          statusEl.textContent = "Authorization complete! You can close this window.";
          statusEl.className = "success";
          setTimeout(() => window.close(), 1500);
        } else {
          statusEl.textContent = `Error: ${data.error || "Unknown error"}`;
          statusEl.className = "error";
        }
      } catch (err) {
        spinnerEl.style.display = "none";
        statusEl.textContent = `Network error: ${err.message}`;
        statusEl.className = "error";
      }
    })();
  </script>
</body>
</html>
